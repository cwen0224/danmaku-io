<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>彈幕IO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="version-badge" class="version-badge">v00000000000000</div>
  <main class="app">
    <header class="hud">
      <div class="hud-item">HP: <span id="hp">100</span></div>
      <div class="hud-item">擊殺: <span id="kills">0</span></div>
      <div class="hud-item">時間: <span id="time">0.0</span>s</div>
      <div class="hud-item">武器: <span id="weapon">長矛</span></div>
      <div class="hud-item">斬擊: <span id="slash-mode">待命</span></div>
    </header>

    <canvas id="game" aria-label="彈幕IO遊戲畫面"></canvas>

    <section id="overlay" class="overlay hidden">
      <h1>遊戲結束</h1>
      <p>存活：<span id="final-time">0.0</span>s</p>
      <p>擊殺：<span id="final-kills">0</span></p>
      <button id="restart">再玩一次</button>
    </section>
  </main>

  <script>
    (function loadGameWithVersion() {
      const fallbackVersion = "20260305150349";
      const vUrl = `version.json?ts=${Date.now()}`;
      fetch(vUrl, { cache: "no-store" })
        .then((r) => (r.ok ? r.json() : Promise.reject(new Error("version fetch failed"))))
        .then((data) => {
          const version = data && data.version ? String(data.version) : fallbackVersion;
          const script = document.createElement("script");
          script.src = `game.js?v=${encodeURIComponent(version)}`;
          document.body.appendChild(script);
        })
        .catch(() => {
          const script = document.createElement("script");
          script.src = `game.js?v=${fallbackVersion}`;
          document.body.appendChild(script);
        });
    })();
  </script>
</body>
</html>
